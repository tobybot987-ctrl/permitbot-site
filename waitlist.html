<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>PermitBot QA Waitlist</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Join the PermitBot QA waitlist" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              teal: '#00E5FF',
              bg: '#F7F4EC',
              dark: '#111827'
            }
          }
        }
      }
    }
  </script>
</head>
<body class="bg-brand-bg text-brand-dark antialiased">
  <div class="min-h-screen flex flex-col">
    <header class="border-b border-slate-200 bg-brand-bg">
      <div class="max-w-3xl mx-auto px-4 h-16 flex items-center justify-between">
        <a href="index.html" class="flex items-center gap-3">
          <img src="permitbot-logo.svg" alt="PermitBot logo" class="h-10 w-auto" />
        </a>
        <a href="index.html" class="text-xs underline text-slate-700">Back home</a>
      </div>
    </header>

    <main class="flex-1">
      <div class="max-w-3xl mx-auto px-4 py-12">
        <h1 class="text-3xl font-semibold tracking-tight">PermitBot QA Waitlist</h1>
        <p class="mt-3 text-sm text-slate-700 max-w-2xl">
          Join early access for rule-pack based discrepancy detection for stormwater submittals.
          We’ll email updates and pilot invites.
        </p>

        <div class="mt-8 rounded-2xl border border-slate-200 bg-white p-6 shadow-sm">
          <form action="https://formspree.io/f/mdalrlyd" method="POST" class="space-y-4">
            <input type="hidden" name="product" value="PermitBot QA Waitlist" />
            <input type="hidden" name="_subject" value="New PermitBot QA waitlist signup" />

            <div>
              <label class="block text-xs font-semibold mb-1">Full name</label>
              <input name="name" required class="w-full rounded-xl border border-slate-300 px-3 py-2 text-sm" />
            </div>

            <div>
              <label class="block text-xs font-semibold mb-1">Work email</label>
              <input name="email" type="email" required class="w-full rounded-xl border border-slate-300 px-3 py-2 text-sm" />
            </div>

            <div class="grid sm:grid-cols-2 gap-4">
              <div>
                <label class="block text-xs font-semibold mb-1">Company</label>
                <input name="company" class="w-full rounded-xl border border-slate-300 px-3 py-2 text-sm" />
              </div>
              <div>
                <label class="block text-xs font-semibold mb-1">Role</label>
                <input name="role" placeholder="EIT, PM, Principal, Reviewer" class="w-full rounded-xl border border-slate-300 px-3 py-2 text-sm" />
              </div>
            </div>

            <div>
              <label class="block text-xs font-semibold mb-1">What jurisdiction(s) matter most?</label>
              <textarea name="jurisdictions" rows="3" class="w-full rounded-xl border border-slate-300 px-3 py-2 text-sm" placeholder="Ex: County, City, Jurisdiction"></textarea>
            </div>

            <button type="submit" class="rounded-full bg-brand-teal px-5 py-2 text-sm font-semibold text-brand-dark hover:bg-[#00B7CC]">
              Join waitlist
            </button>
          </form>
        </div>
      </div>
    </main>
  </div>
</body>
</html>
