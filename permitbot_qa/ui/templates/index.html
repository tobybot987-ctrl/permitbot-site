<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>PermitBot QA Runner</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { brand: { teal: '#00E5FF', bg: '#F7F4EC', dark: '#111827' } } } }
    }
  </script>
</head>
<body class="bg-brand-bg text-brand-dark antialiased">
  <div class="max-w-4xl mx-auto px-4 py-8">
    <div class="flex items-center gap-3 mb-6">
      <img src="/permitbot-logo.svg" class="h-10" alt="PermitBot" />
      <h1 class="text-2xl font-semibold">PermitBot QA Runner</h1>
    </div>

    <form action="/run" method="post" enctype="multipart/form-data" class="bg-white border border-slate-200 rounded-2xl p-6 space-y-4 shadow-sm">
      <div>
        <label class="block text-xs font-semibold mb-1">Jurisdiction</label>
        <select name="jurisdiction" required class="w-full rounded-xl border border-slate-300 px-3 py-2 text-sm">
          {% for j in jurisdictions %}
          <option value="{{j}}">{{j}}</option>
          {% endfor %}
        </select>
      </div>

      <div class="grid sm:grid-cols-2 gap-4">
        <div>
          <label class="block text-xs font-semibold mb-1">Project type</label>
          <input name="project_type" value="all" class="w-full rounded-xl border border-slate-300 px-3 py-2 text-sm"/>
        </div>
        <div>
          <label class="block text-xs font-semibold mb-1">Secondary packs (optional)</label>
          <input name="secondary_packs" placeholder="city-a@20260301, district-b@20260302" class="w-full rounded-xl border border-slate-300 px-3 py-2 text-sm"/>
        </div>
      </div>

      <label class="text-sm"><input type="checkbox" name="refresh_pack" value="1" class="mr-2"/>Refresh jurisdiction pack before run</label>

      <div>
        <label class="block text-xs font-semibold mb-1">Upload 1–3 PDFs</label>
        <input type="file" name="pdfs" accept="application/pdf" multiple required class="w-full rounded-xl border border-slate-300 px-3 py-2 text-sm bg-white"/>
      </div>

      <button class="rounded-full bg-brand-teal px-5 py-2 text-sm font-semibold text-brand-dark hover:bg-[#00B7CC]">Run Check 01 (storm_event_retention)</button>
    </form>
  </div>
</body>
</html>
