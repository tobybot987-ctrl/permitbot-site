<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>PermitBot QA Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-900">
  <div class="max-w-md mx-auto mt-24 bg-white border rounded-2xl p-6 shadow-sm">
    <h1 class="text-xl font-semibold">PermitBot QA Login</h1>
    <p class="text-sm text-slate-600 mt-1">Sign in with your Supabase user credentials.</p>
    <form action="/login" method="post" class="mt-4 space-y-3">
      <div>
        <label class="block text-xs font-semibold mb-1">Email</label>
        <input name="email" type="email" required class="w-full rounded-xl border border-slate-300 px-3 py-2 text-sm" />
      </div>
      <div>
        <label class="block text-xs font-semibold mb-1">Password</label>
        <input name="password" type="password" required class="w-full rounded-xl border border-slate-300 px-3 py-2 text-sm" />
      </div>
      <button class="rounded-full bg-black text-white px-4 py-2 text-sm">Sign in</button>
    </form>
  </div>
</body>
</html>
